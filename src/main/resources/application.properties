# SQLite database file path
ringit.db.url=jdbc:sqlite:./data/ringitdb.db

# JDBC driver class - change to match your database/driver jar in pom.xml
# SQLite (embedded):  org.sqlite.JDBC
# libSQL (sqld):      org.sqlite.JDBC  (uses sqlite-jdbc with libSQL URL)
ringit.db.driver=org.sqlite.JDBC

# Hibernate dialect - change to match the driver above
# SQLite:  org.hibernate.community.dialect.SQLiteDialect
ringit.db.dialect=org.hibernate.community.dialect.SQLiteDialect
